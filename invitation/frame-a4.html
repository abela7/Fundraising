<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethiopian Frame — A4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #d0d0d0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .frame {
            position: relative;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: width 0.3s, height 0.3s;
        }

        .frame.portrait {
            width: 210mm;
            height: 297mm;
        }

        .frame.landscape {
            width: 297mm;
            height: 210mm;
        }

        /* Tibeb borders */
        .tibeb-top, .tibeb-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 18px;
            background: url('Pattern_Two!.jpeg') repeat-x center;
            background-size: auto 100%;
            z-index: 10;
        }
        .tibeb-top { top: 0; }
        .tibeb-bottom { bottom: 0; }

        .tibeb-left, .tibeb-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 18px;
            background: url('Pattern_Two! - Vertical.jpeg') repeat-y center;
            background-size: 100% auto;
            z-index: 10;
        }
        .tibeb-left { left: 0; }
        .tibeb-right { right: 0; }

        /* Background pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: url('Ethiopian_Design.png') repeat;
            background-size: 80px;
            opacity: 0.05;
            display: none;
            pointer-events: none;
        }

        .bg-pattern.active { display: block; }

        /* Flag colour gradient */
        .bg-gradient {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            display: none;
            background:
                radial-gradient(ellipse 60% 40% at 5% 5%, rgba(0, 128, 55, var(--grad-opacity, 0.15)), transparent),
                radial-gradient(ellipse 50% 30% at 50% 50%, rgba(252, 209, 22, var(--grad-opacity, 0.1)), transparent),
                radial-gradient(ellipse 60% 40% at 95% 95%, rgba(186, 34, 34, var(--grad-opacity, 0.15)), transparent);
        }

        .bg-gradient.active { display: block; }

        .controls {
            display: flex;
            gap: 10px;
            margin: 0 auto 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .toggle-controls {
            display: flex;
            gap: 16px;
            margin: 0 auto 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            background: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .toggle-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #064a66;
            cursor: pointer;
        }

        .slider-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            background: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .slider-item input[type="range"] {
            width: 120px;
            accent-color: #064a66;
            cursor: pointer;
        }

        .slider-value {
            font-weight: 700;
            color: #064a66;
            min-width: 35px;
            text-align: center;
        }

        .orient-btn {
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 6px;
            color: #064a66;
            background: #fff;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }

        .orient-btn:hover {
            border-color: #0a6286;
        }

        .orient-btn.active {
            background: #064a66;
            color: #fff;
            border-color: #064a66;
        }

        .download-btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #0a6286, #0d7da8);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(10, 98, 134, 0.4);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 0 auto 20px;
            flex-wrap: wrap;
        }

        .card-nav a {
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 6px;
            color: #064a66;
            background: #fff;
            border: 1px solid #ddd;
            transition: all 0.2s;
        }

        .card-nav a:hover {
            background: #064a66;
            color: #fff;
            border-color: #064a66;
        }

        .card-nav a.active {
            background: #064a66;
            color: #fff;
            border-color: #064a66;
        }

        .size-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 8px;
        }

        @media print {
            .download-btn, .card-nav, .btn-row, .controls, .size-label { display: none; }
            body { background: none; display: block; min-height: auto; padding: 0; }
            .frame { box-shadow: none; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .frame.portrait + .size-label ~ style { }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

    <div class="card-nav">
        <a href="card-front-v2.html">Front Light</a>
        <a href="card-back.html">Back Light</a>
        <a href="card-back-v2.html">Back V2</a>
        <a href="card-front-v2-dark.html">Front Dark</a>
        <a href="card-back-dark.html">Back Dark</a>
        <a href="card-back-v2-dark.html">Back V2 Dark</a>
        <a href="frame-a4.html" class="active">A4 Frame</a>
    </div>

    <div class="controls">
        <button class="orient-btn active" onclick="setOrientation('portrait')">Portrait (21cm × 29.7cm)</button>
        <button class="orient-btn" onclick="setOrientation('landscape')">Landscape (29.7cm × 21cm)</button>
    </div>

    <div class="toggle-controls">
        <label class="toggle-item">
            <input type="checkbox" id="togglePattern" onchange="togglePattern(this.checked)">
            Ethiopian Pattern
        </label>
        <label class="toggle-item">
            <input type="checkbox" id="toggleGradient" onchange="toggleGradient(this.checked)">
            Flag Colours
        </label>
        <div class="slider-item" id="opacitySlider" style="display:none;">
            <span>Opacity:</span>
            <input type="range" id="gradientOpacity" min="5" max="80" value="15" oninput="updateOpacity(this.value)">
            <span class="slider-value" id="opacityValue">15%</span>
        </div>
    </div>

    <div class="frame portrait" id="frameCard">
        <div class="bg-pattern" id="bgPattern"></div>
        <div class="bg-gradient" id="bgGradient"></div>
        <div class="tibeb-top"></div>
        <div class="tibeb-bottom"></div>
        <div class="tibeb-left"></div>
        <div class="tibeb-right"></div>
    </div>

    <div class="size-label" id="sizeLabel">A4 Portrait — 210mm × 297mm</div>

    <div class="btn-row">
        <button class="download-btn" onclick="downloadFrame('png')">Download PNG (White)</button>
        <button class="download-btn" onclick="downloadFrame('transparent')">Download PNG (Transparent)</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.5/dist/dom-to-image-more.min.js"></script>
    <script>
        let currentOrientation = 'portrait';

        function togglePattern(on) {
            document.getElementById('bgPattern').classList.toggle('active', on);
        }

        function toggleGradient(on) {
            document.getElementById('bgGradient').classList.toggle('active', on);
            document.getElementById('opacitySlider').style.display = on ? 'flex' : 'none';
        }

        function updateOpacity(val) {
            const opacity = val / 100;
            document.getElementById('frameCard').style.setProperty('--grad-opacity', opacity);
            document.getElementById('opacityValue').textContent = val + '%';
        }

        function setOrientation(orient) {
            currentOrientation = orient;
            const frame = document.getElementById('frameCard');
            frame.classList.remove('portrait', 'landscape');
            frame.classList.add(orient);

            document.querySelectorAll('.orient-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('sizeLabel').textContent = orient === 'portrait'
                ? 'A4 Portrait — 210mm × 297mm'
                : 'A4 Landscape — 297mm × 210mm';
        }

        async function downloadFrame(type) {
            const frame = document.getElementById('frameCard');
            const btns = document.querySelectorAll('.download-btn');
            const w = frame.offsetWidth;
            const h = frame.offsetHeight;
            const scale = 4;

            btns.forEach(b => { b.textContent = 'Generating...'; b.disabled = true; });

            try {
                const options = {
                    width: w * scale,
                    height: h * scale,
                    quality: 1,
                    cacheBust: true,
                    style: {
                        transform: `scale(${scale})`,
                        transformOrigin: 'top left',
                        width: `${w}px`,
                        height: `${h}px`
                    }
                };

                if (type === 'transparent') {
                    options.bgcolor = 'transparent';
                } else {
                    options.bgcolor = '#ffffff';
                }

                const dataUrl = await domtoimage.toPng(frame, options);

                const orient = currentOrientation === 'portrait' ? 'Portrait' : 'Landscape';
                const suffix = type === 'transparent' ? '-Transparent' : '';

                const link = document.createElement('a');
                link.download = `Ethiopian-Frame-A4-${orient}${suffix}.png`;
                link.href = dataUrl;
                link.click();
            } catch (err) {
                console.error('Download failed:', err);
            } finally {
                btns[0].textContent = 'Download PNG (White)';
                btns[1].textContent = 'Download PNG (Transparent)';
                btns.forEach(b => b.disabled = false);
            }
        }
    </script>
</body>
</html>
