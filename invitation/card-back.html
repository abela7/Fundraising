<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Card — Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #d0d0d0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            width: 148mm;
            height: 105mm;
            position: relative;
            overflow: hidden;
            background: #faf8f2;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* Background: church on left, priests on right — blended */
        .bg-church,
        .bg-priests {
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 0;
        }

        .bg-church {
            left: 0;
            width: 55%;
        }

        .bg-priests {
            right: 0;
            width: 55%;
        }

        .bg-church img,
        .bg-priests img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-church img {
            opacity: 0.12;
            object-position: center;
        }

        .bg-priests img {
            opacity: 0.15;
            object-position: center 30%;
        }

        /* Fade edges so they blend into each other */
        .bg-church::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 30%, rgba(250, 248, 242, 1) 100%);
        }

        .bg-priests::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to left, transparent 30%, rgba(250, 248, 242, 1) 100%);
        }

        /* Same ambient flag colour glows as front */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 5% 10%, rgba(0, 128, 55, 0.25), transparent),
                radial-gradient(ellipse 60% 45% at 50% 40%, rgba(252, 209, 22, 0.18), transparent),
                radial-gradient(ellipse 70% 55% at 95% 90%, rgba(186, 34, 34, 0.25), transparent);
            z-index: 1;
            pointer-events: none;
        }

        /* Tibeb borders */
        .tibeb-top,
        .tibeb-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 12px;
            background: url('Pattern_Two!.jpeg') repeat-x center;
            background-size: auto 100%;
            z-index: 10;
        }

        .tibeb-top { top: 0; }
        .tibeb-bottom { bottom: 0; }

        /* Center-aligned content */
        .card-content {
            position: relative;
            z-index: 5;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 22px 20px;
        }

        /* EOTC Icon */
        .eotc-icon {
            width: 42px;
            height: 42px;
            margin-bottom: 6px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.5px solid rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.9);
            padding: 2px;
        }

        .eotc-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .back-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.42rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        /* Contact row */
        .contact-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contact-icon {
            width: 20px;
            height: 20px;
            background: #D4AF37;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.42rem;
            flex-shrink: 0;
        }

        .contact-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.48rem;
            font-weight: 500;
            color: #000;
            text-align: left;
            line-height: 1.3;
        }

        .contact-text small {
            display: block;
            font-size: 0.32rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(0, 0, 0, 0.4);
            margin-bottom: 1px;
        }

        /* Thin divider */
        .thin-line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.15), transparent);
            margin: 8px auto;
        }

        /* QR + signoff row */
        .bottom-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .qr-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .qr-block img {
            width: 48px;
            height: 48px;
            display: block;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            padding: 2px;
            background: #fff;
        }

        .qr-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(0, 0, 0, 0.35);
        }

        .signoff {
            text-align: left;
        }

        .signoff-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.5rem;
            font-style: italic;
            color: rgba(0, 0, 0, 0.65);
            margin-bottom: 1px;
        }

        .signoff-org {
            font-family: 'Outfit', sans-serif;
            font-size: 0.55rem;
            font-weight: 700;
            color: #000;
        }

        /* Website */
        .website-link {
            margin-top: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.35rem;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.35);
        }

        .website-link a {
            color: rgba(0, 0, 0, 0.5);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        }

        @media print {
            body {
                background: none;
                display: block;
                min-height: auto;
                padding: 0;
            }

            .card {
                box-shadow: none;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page {
                size: 148mm 105mm;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Church on left side, blended -->
        <div class="bg-church">
            <img src="../assets/images/new-church.png" alt="">
        </div>
        <!-- Priests on right side, blended -->
        <div class="bg-priests">
            <img src="EOTC_Members_two.jpg" alt="">
        </div>

        <div class="tibeb-top"></div>
        <div class="tibeb-bottom"></div>

        <div class="card-content">

            <div class="eotc-icon">
                <img src="EOTC_Icon.png" alt="EOTC">
            </div>

            <div class="back-label">For Further Information</div>

            <div class="contact-row">
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-phone"></i></div>
                    <div class="contact-text">
                        <small>Phone</small>
                        07951 403936
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                    <div class="contact-text">
                        <small>Email</small>
                        stakeholder@<wbr>abuneteklehaymanot.org
                    </div>
                </div>
            </div>

            <div class="thin-line"></div>

            <div class="bottom-section">
                <div class="qr-block">
                    <img src="RSRV .jpeg" alt="RSVP QR Code">
                    <span class="qr-label">Scan to RSVP</span>
                </div>
                <div class="signoff">
                    <div class="signoff-text">Looking forward to welcoming you,</div>
                    <div class="signoff-org">LMKAT EOTC.</div>
                </div>
            </div>

            <div class="website-link">
                <i class="fas fa-globe"></i> <a href="https://abuneteklehaymanot.org">abuneteklehaymanot.org</a>
            </div>

        </div>
    </div>

</body>
</html>
