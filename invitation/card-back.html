<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Card — Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #d0d0d0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            width: 148mm;
            height: 105mm;
            position: relative;
            overflow: hidden;
            background: #0a1a2a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* Church photo as full background with dark overlay */
        .card-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .card-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }

        /* Dark gradient overlay for readability */
        .card-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(10, 26, 42, 0.92) 0%, rgba(10, 50, 70, 0.85) 50%, rgba(10, 26, 42, 0.92) 100%);
        }

        /* Tibeb borders */
        .tibeb-top,
        .tibeb-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 10px;
            background: url('Pattern_Two!.jpeg') repeat-x center;
            background-size: auto 100%;
            z-index: 10;
        }

        .tibeb-top { top: 0; }
        .tibeb-bottom { bottom: 0; }

        /* Main layout: two columns */
        .card-content {
            position: relative;
            z-index: 5;
            display: flex;
            height: 100%;
            padding: 16px 14px;
        }

        /* LEFT: Photo collage column */
        .photo-col {
            width: 42%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 12px;
        }

        .photo-frame {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1.5px solid rgba(212, 175, 55, 0.35);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-main {
            flex: 1.1;
        }

        .photo-row {
            flex: 1;
            display: flex;
            gap: 5px;
        }

        .photo-row .photo-frame {
            flex: 1;
        }

        /* Gold corner accents on main photo */
        .photo-main::before,
        .photo-main::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: #D4AF37;
            border-style: solid;
            z-index: 2;
        }

        .photo-main::before {
            top: 4px;
            left: 4px;
            border-width: 1.5px 0 0 1.5px;
        }

        .photo-main::after {
            bottom: 4px;
            right: 4px;
            border-width: 0 1.5px 1.5px 0;
        }

        /* RIGHT: Info column */
        .info-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-left: 4px;
        }

        /* EOTC Icon */
        .eotc-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 8px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.5px solid rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.95);
            padding: 3px;
        }

        .eotc-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Contact heading */
        .back-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.42rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #D4AF37;
            margin-bottom: 8px;
        }

        /* Contact items stacked */
        .contact-stack {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
            width: 100%;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 7px;
            justify-content: center;
        }

        .contact-icon {
            width: 20px;
            height: 20px;
            background: #D4AF37;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a1a2a;
            font-size: 0.45rem;
            flex-shrink: 0;
        }

        .contact-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.5rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-align: left;
        }

        .contact-text small {
            display: block;
            font-size: 0.36rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 1px;
        }

        /* Divider */
        .gold-line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            margin: 6px auto;
        }

        /* QR code */
        .qr-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            margin-bottom: 8px;
        }

        .qr-block img {
            width: 50px;
            height: 50px;
            display: block;
            border: 1.5px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            background: #fff;
            padding: 2px;
        }

        .qr-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.32rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(212, 175, 55, 0.6);
        }

        /* Signoff */
        .signoff-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.5rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 1px;
        }

        .signoff-org {
            font-family: 'Outfit', sans-serif;
            font-size: 0.55rem;
            font-weight: 700;
            color: #D4AF37;
        }

        /* Website */
        .website-link {
            margin-top: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.36rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
        }

        .website-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        @media print {
            body {
                background: none;
                display: block;
                min-height: auto;
                padding: 0;
            }

            .card {
                box-shadow: none;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page {
                size: 148mm 105mm;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Church as subtle background -->
        <div class="card-bg">
            <img src="../assets/images/new-church.png" alt="">
        </div>

        <div class="tibeb-top"></div>
        <div class="tibeb-bottom"></div>

        <div class="card-content">

            <!-- LEFT: Photo collage -->
            <div class="photo-col">
                <div class="photo-frame photo-main">
                    <img src="EOTC_Members.jpg" alt="Church congregation">
                </div>
                <div class="photo-row">
                    <div class="photo-frame">
                        <img src="EOTC_Members_two.jpg" alt="Priests performing hymns">
                    </div>
                    <div class="photo-frame">
                        <img src="../assets/images/new-church.png" alt="St Gabriel's Church">
                    </div>
                </div>
            </div>

            <!-- RIGHT: Contact info + QR -->
            <div class="info-col">

                <div class="eotc-icon">
                    <img src="EOTC_Icon.png" alt="EOTC">
                </div>

                <div class="back-label">Get In Touch</div>

                <div class="contact-stack">
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-phone"></i></div>
                        <div class="contact-text">
                            <small>Phone</small>
                            07951 403936
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                        <div class="contact-text">
                            <small>Email</small>
                            stakeholder@<br>abuneteklehaymanot.org
                        </div>
                    </div>
                </div>

                <div class="gold-line"></div>

                <div class="qr-block">
                    <img src="RSRV .jpeg" alt="RSVP QR Code">
                    <span class="qr-label">Scan to RSVP</span>
                </div>

                <div class="signoff-text">Looking forward to welcoming you,</div>
                <div class="signoff-org">LMKAT EOTC.</div>

                <div class="website-link">
                    <i class="fas fa-globe"></i> <a href="https://abuneteklehaymanot.org">abuneteklehaymanot.org</a>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
