<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Card — Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #d0d0d0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            width: 148mm;
            height: 105mm;
            position: relative;
            overflow: hidden;
            background: #faf8f2;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* Same ambient flag colour glows */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 5% 10%, rgba(0, 128, 55, 0.25), transparent),
                radial-gradient(ellipse 60% 45% at 50% 40%, rgba(252, 209, 22, 0.18), transparent),
                radial-gradient(ellipse 70% 55% at 95% 90%, rgba(186, 34, 34, 0.25), transparent);
            z-index: 0;
            pointer-events: none;
        }

        /* Tibeb borders */
        .tibeb-top,
        .tibeb-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 12px;
            background: url('Pattern_Two!.jpeg') repeat-x center;
            background-size: auto 100%;
            z-index: 10;
        }

        .tibeb-top { top: 0; }
        .tibeb-bottom { bottom: 0; }

        .card-content {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 28px 24px;
            text-align: center;
        }

        /* Contact section */
        .back-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: rgba(0, 0, 0, 0.4);
            margin-bottom: 10px;
        }

        .back-heading {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            color: #000;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .contact-row {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-icon {
            width: 26px;
            height: 26px;
            background: #D4AF37;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 0.6rem;
        }

        .contact-detail {
            text-align: left;
        }

        .contact-detail-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.45rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(0, 0, 0, 0.5);
            line-height: 1;
            margin-bottom: 2px;
        }

        .contact-detail-value {
            font-family: 'Outfit', sans-serif;
            font-size: 0.6rem;
            font-weight: 500;
            color: #000;
            line-height: 1.2;
        }

        /* Divider */
        .back-divider {
            width: 60%;
            height: 1px;
            background: rgba(0, 0, 0, 0.12);
            margin: 12px auto;
        }

        /* QR + Signoff row */
        .bottom-row {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .qr-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .qr-block img {
            width: 56px;
            height: 56px;
            display: block;
            border: 1.5px solid rgba(0, 0, 0, 0.12);
            border-radius: 3px;
        }

        .qr-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.35rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(0, 0, 0, 0.45);
        }

        .signoff {
            text-align: left;
        }

        .signoff-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.65rem;
            font-style: italic;
            color: #000;
            margin-bottom: 2px;
        }

        .signoff-org {
            font-family: 'Outfit', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: #000;
        }

        /* Website link */
        .website-link {
            margin-top: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.45rem;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.5);
            letter-spacing: 0.05em;
        }

        .website-link a {
            color: rgba(0, 0, 0, 0.6);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.15);
        }

        @media print {
            body {
                background: none;
                display: block;
                min-height: auto;
                padding: 0;
            }

            .card {
                box-shadow: none;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page {
                size: 148mm 105mm;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="tibeb-top"></div>
        <div class="tibeb-bottom"></div>

        <div class="card-content">

            <div class="back-label">For Further Information</div>

            <div class="back-heading">Please contact us</div>

            <div class="contact-row">
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-phone"></i></div>
                    <div class="contact-detail">
                        <div class="contact-detail-label">Phone</div>
                        <div class="contact-detail-value">07951 403936</div>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                    <div class="contact-detail">
                        <div class="contact-detail-label">Email</div>
                        <div class="contact-detail-value">stakeholder@abuneteklehaymanot.org</div>
                    </div>
                </div>
            </div>

            <div class="back-divider"></div>

            <div class="bottom-row">
                <div class="qr-block">
                    <img src="RSRV .jpeg" alt="RSVP QR Code">
                    <span class="qr-label">Scan to RSVP</span>
                </div>
                <div class="signoff">
                    <div class="signoff-text">Looking forward to welcoming you,</div>
                    <div class="signoff-org">LMKAT EOTC.</div>
                </div>
            </div>

            <div class="website-link">
                <i class="fas fa-globe"></i> <a href="https://abuneteklehaymanot.org">abuneteklehaymanot.org</a>
            </div>

        </div>
    </div>

</body>
</html>
