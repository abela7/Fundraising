<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Card — Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #d0d0d0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            width: 148mm;
            height: 105mm;
            position: relative;
            overflow: hidden;
            background: #faf8f2;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* Background: church on left, priests on right — blended */
        .bg-church,
        .bg-priests {
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 0;
        }

        .bg-church {
            left: 0;
            width: 55%;
        }

        .bg-priests {
            right: 0;
            width: 55%;
        }

        .bg-church img,
        .bg-priests img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-church img {
            opacity: 0.12;
            object-position: center;
        }

        .bg-priests img {
            opacity: 0.15;
            object-position: center 30%;
        }

        /* Fade edges so they blend into each other seamlessly */
        .bg-church::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 20%, rgba(250, 248, 242, 0.6) 60%, rgba(250, 248, 242, 1) 100%);
        }

        .bg-priests::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to left, transparent 20%, rgba(250, 248, 242, 0.6) 60%, rgba(250, 248, 242, 1) 100%);
        }

        /* Same ambient flag colour glows as front */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 5% 10%, rgba(0, 128, 55, 0.25), transparent),
                radial-gradient(ellipse 60% 45% at 50% 40%, rgba(252, 209, 22, 0.18), transparent),
                radial-gradient(ellipse 70% 55% at 95% 90%, rgba(186, 34, 34, 0.25), transparent);
            z-index: 1;
            pointer-events: none;
        }

        /* Tibeb borders */
        .tibeb-top,
        .tibeb-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 12px;
            background: url('Pattern_Two!.jpeg') repeat-x center;
            background-size: auto 100%;
            z-index: 10;
        }

        .tibeb-top { top: 0; }
        .tibeb-bottom { bottom: 0; }

        /* Center-aligned content */
        .card-content {
            position: relative;
            z-index: 5;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 24px;
        }

        /* EOTC Icon — large and prominent */
        .eotc-icon {
            width: 80px;
            height: 80px;
            min-width: 80px;
            min-height: 80px;
            margin-bottom: 10px;
            border-radius: 50%;
            overflow: hidden;
            border: 2.5px solid rgba(212, 175, 55, 0.5);
            background: rgba(255, 255, 255, 0.92);
            padding: 4px;
            box-shadow: 0 3px 14px rgba(0, 0, 0, 0.1);
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
        }

        .eotc-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .back-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: rgba(0, 0, 0, 0.55);
            margin-bottom: 12px;
        }

        /* Contact wrapper — centers the block, content left-aligned inside */
        .contact-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .contact-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .contact-icon {
            width: 30px;
            height: 30px;
            background: #D4AF37;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.6rem;
            flex-shrink: 0;
        }

        .contact-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            color: #000;
            text-align: left;
            line-height: 1.3;
        }

        .contact-text small {
            display: block;
            font-size: 0.42rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(0, 0, 0, 0.4);
            margin-bottom: 1px;
        }

        /* Thin divider */
        .thin-line {
            width: 70px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.18), transparent);
            margin: 10px auto;
        }

        /* QR section */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .qr-intro {
            font-family: 'Outfit', sans-serif;
            font-size: 0.55rem;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.55);
            margin-bottom: 7px;
            line-height: 1.5;
            max-width: 320px;
        }

        .qr-section img {
            width: 68px;
            height: 68px;
            display: block;
            border: 1.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            padding: 3px;
            background: #fff;
        }

        /* Signoff */
        .signoff {
            text-align: center;
            margin-top: 4px;
        }

        .signoff-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            font-style: italic;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.6);
            margin-bottom: 3px;
        }

        .signoff-org {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #000;
            letter-spacing: 0.06em;
        }

        /* Website */
        .website-link {
            margin-top: 7px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.45rem;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.35);
        }

        .website-link a {
            color: rgba(0, 0, 0, 0.5);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        }

        .download-btn {
            display: block;
            margin: 20px auto;
            padding: 14px 36px;
            background: linear-gradient(135deg, #0a6286, #0d7da8);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(10, 98, 134, 0.4);
        }

        @media print {
            .download-btn { display: none; }

            body {
                background: none;
                display: block;
                min-height: auto;
                padding: 0;
            }

            .card {
                box-shadow: none;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page {
                size: 148mm 105mm;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Church on left side, blended -->
        <div class="bg-church">
            <img src="../assets/images/new-church.png" alt="">
        </div>
        <!-- Priests on right side, blended -->
        <div class="bg-priests">
            <img src="EOTC_Members_two.jpg" alt="">
        </div>

        <div class="tibeb-top"></div>
        <div class="tibeb-bottom"></div>

        <div class="card-content">

            <div class="eotc-icon">
                <img src="EOTC_Icon.png" alt="EOTC">
            </div>

            <div class="back-label">For Further Information</div>

            <div class="contact-wrapper">
                <div class="contact-stack">
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-phone"></i></div>
                        <div class="contact-text">
                            <small>Phone</small>
                            07951 403936
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                        <div class="contact-text">
                            <small>Email</small>
                            stakeholder@abuneteklehaymanot.org
                        </div>
                    </div>
                </div>
            </div>

            <div class="thin-line"></div>

            <div class="qr-section">
                <div class="qr-intro">Scan here to get more information and reserve if you are interested</div>
                <img src="RSRV .jpeg" alt="RSVP QR Code">
            </div>

            <div class="signoff">
                <div class="signoff-text">Looking forward to welcoming you,</div>
                <div class="signoff-org">LMKAT EOTC.</div>
            </div>

            <div class="website-link">
                <i class="fas fa-globe"></i> <a href="https://abuneteklehaymanot.org">abuneteklehaymanot.org</a>
            </div>

        </div>
    </div>

    <button class="download-btn" onclick="downloadCard()">Download Back Card (High Quality)</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function downloadCard() {
            const card = document.querySelector('.card');
            const btn = document.querySelector('.download-btn');
            btn.textContent = 'Generating...';
            btn.disabled = true;

            html2canvas(card, {
                scale: 4,
                useCORS: true,
                allowTaint: true,
                backgroundColor: null,
                width: card.offsetWidth,
                height: card.offsetHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'LMKAT-EOTC-Invitation-Back.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                btn.textContent = 'Download Back Card (High Quality)';
                btn.disabled = false;
            }).catch(() => {
                btn.textContent = 'Download Back Card (High Quality)';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
