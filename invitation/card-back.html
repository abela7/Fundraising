<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Card — Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #d0d0d0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .card {
            width: 148mm;
            height: 105mm;
            position: relative;
            overflow: hidden;
            background: #faf8f2;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* Same ambient flag colour glows as front */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 5% 10%, rgba(0, 128, 55, 0.25), transparent),
                radial-gradient(ellipse 60% 45% at 50% 40%, rgba(252, 209, 22, 0.18), transparent),
                radial-gradient(ellipse 70% 55% at 95% 90%, rgba(186, 34, 34, 0.25), transparent);
            z-index: 1;
            pointer-events: none;
        }

        /* Blended member photos as atmospheric background */
        .bg-blend {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .bg-blend img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-blend img:nth-child(1) {
            opacity: 0.06;
            object-position: center 30%;
        }

        .bg-blend img:nth-child(2) {
            opacity: 0.05;
            mix-blend-mode: overlay;
            object-position: center 40%;
        }

        /* Soft vignette over blended photos */
        .bg-blend::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(250, 248, 242, 0.7) 100%);
        }

        /* Tibeb borders */
        .tibeb-top,
        .tibeb-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 12px;
            background: url('Pattern_Two!.jpeg') repeat-x center;
            background-size: auto 100%;
            z-index: 10;
        }

        .tibeb-top { top: 0; }
        .tibeb-bottom { bottom: 0; }

        /* Main layout */
        .card-content {
            position: relative;
            z-index: 5;
            display: flex;
            height: 100%;
            padding: 18px 16px;
        }

        /* LEFT: Church photo + EOTC icon */
        .left-col {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-right: 12px;
            gap: 8px;
        }

        .church-frame {
            position: relative;
            width: 100%;
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        .church-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Gold corner accents */
        .church-frame::before,
        .church-frame::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: #D4AF37;
            border-style: solid;
            z-index: 2;
        }

        .church-frame::before {
            top: 5px;
            left: 5px;
            border-width: 2px 0 0 2px;
        }

        .church-frame::after {
            bottom: 5px;
            right: 5px;
            border-width: 0 2px 2px 0;
        }

        /* Church label */
        .church-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.42rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        /* RIGHT: Info column */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* EOTC Icon */
        .eotc-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 6px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.5px solid rgba(212, 175, 55, 0.35);
            background: rgba(255, 255, 255, 0.9);
            padding: 2px;
        }

        .eotc-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .back-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(0, 0, 0, 0.55);
            margin-bottom: 8px;
        }

        /* Contact items */
        .contact-stack {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 8px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contact-icon {
            width: 18px;
            height: 18px;
            background: #D4AF37;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.4rem;
            flex-shrink: 0;
        }

        .contact-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.48rem;
            font-weight: 500;
            color: #000;
            text-align: left;
            line-height: 1.3;
        }

        .contact-text small {
            display: block;
            font-size: 0.32rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(0, 0, 0, 0.4);
            margin-bottom: 1px;
        }

        /* Thin divider */
        .thin-line {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.15), transparent);
            margin: 6px auto;
        }

        /* QR code */
        .qr-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            margin-bottom: 6px;
        }

        .qr-block img {
            width: 44px;
            height: 44px;
            display: block;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            padding: 2px;
            background: #fff;
        }

        .qr-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(0, 0, 0, 0.35);
        }

        /* Signoff */
        .signoff-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.48rem;
            font-style: italic;
            color: rgba(0, 0, 0, 0.7);
            margin-bottom: 1px;
        }

        .signoff-org {
            font-family: 'Outfit', sans-serif;
            font-size: 0.52rem;
            font-weight: 700;
            color: #000;
        }

        /* Website */
        .website-link {
            margin-top: 5px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.34rem;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.35);
        }

        .website-link a {
            color: rgba(0, 0, 0, 0.5);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        }

        @media print {
            body {
                background: none;
                display: block;
                min-height: auto;
                padding: 0;
            }

            .card {
                box-shadow: none;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page {
                size: 148mm 105mm;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Blended member photos as subtle atmospheric background -->
        <div class="bg-blend">
            <img src="EOTC_Members.jpg" alt="">
            <img src="EOTC_Members_two.jpg" alt="">
        </div>

        <div class="tibeb-top"></div>
        <div class="tibeb-bottom"></div>

        <div class="card-content">

            <!-- LEFT: Church building photo -->
            <div class="left-col">
                <div class="church-frame">
                    <img src="../assets/images/new-church.png" alt="St Gabriel's Church">
                </div>
                <div class="church-label">St Gabriel's Church, Liverpool</div>
            </div>

            <!-- RIGHT: Contact + QR -->
            <div class="right-col">

                <div class="eotc-icon">
                    <img src="EOTC_Icon.png" alt="EOTC">
                </div>

                <div class="back-label">For Further Information</div>

                <div class="contact-stack">
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-phone"></i></div>
                        <div class="contact-text">
                            <small>Phone</small>
                            07951 403936
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                        <div class="contact-text">
                            <small>Email</small>
                            stakeholder@<wbr>abuneteklehaymanot.org
                        </div>
                    </div>
                </div>

                <div class="thin-line"></div>

                <div class="qr-block">
                    <img src="RSRV .jpeg" alt="RSVP QR Code">
                    <span class="qr-label">Scan to RSVP</span>
                </div>

                <div class="signoff-text">Looking forward to welcoming you,</div>
                <div class="signoff-org">LMKAT EOTC.</div>

                <div class="website-link">
                    <i class="fas fa-globe"></i> <a href="https://abuneteklehaymanot.org">abuneteklehaymanot.org</a>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
