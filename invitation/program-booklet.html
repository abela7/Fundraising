<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Booklet — LMKAT EOTC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #e8ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .a4-page {
            width: 210mm;
            height: 297mm;
            position: relative;
            overflow: hidden;
            background: #faf8f2;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            flex-shrink: 0;
        }

        /* Border - Pattern One */
        .tibeb-top, .tibeb-bottom {
            position: absolute; left: 0; right: 0; height: 18px;
            background: url('Pattern_Two!.jpeg') repeat-x center; background-size: auto 100%; z-index: 10;
        }
        .tibeb-top { top: 0; } .tibeb-bottom { bottom: 0; }

        .tibeb-left, .tibeb-right {
            position: absolute; top: 0; bottom: 0; width: 18px;
            background: url('Pattern_Two! - Vertical.jpeg') repeat-y center; background-size: 100% auto; z-index: 10;
        }
        .tibeb-left { left: 0; } .tibeb-right { right: 0; }

        /* Flag Colours */
        .bg-gradient {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background:
                radial-gradient(ellipse 60% 40% at 5% 5%, rgba(0, 128, 55, 0.15), transparent),
                radial-gradient(ellipse 50% 30% at 50% 50%, rgba(252, 209, 22, 0.1), transparent),
                radial-gradient(ellipse 60% 40% at 95% 95%, rgba(186, 34, 34, 0.15), transparent);
        }

        /* Content area */
        .page-content {
            position: relative; z-index: 5;
            width: 100%; height: 100%;
            padding: 28px;
        }

        @media print {
            body { background: none; padding: 0; }
            .a4-page { box-shadow: none; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            @page { size: A4 portrait; margin: 0; }
        }
    </style>
</head>
<body>

<div class="a4-page">
    <div class="bg-gradient"></div>
    <div class="tibeb-top"></div>
    <div class="tibeb-bottom"></div>
    <div class="tibeb-left"></div>
    <div class="tibeb-right"></div>

    <div class="page-content">
    </div>
</div>

</body>
</html>
